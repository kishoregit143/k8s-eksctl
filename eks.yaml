apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: roboshop-dev
  region: us-east-1
  version: "1.34"

managedNodeGroups:
  - name: roboshop-dev
    instanceTypes:
      - t3.large
      - t3.xlarge
      - m5.large
      - c5.large
    desiredCapacity: 2
    minSize: 2
    maxSize: 3
    volumeSize: 10